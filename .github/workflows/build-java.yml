name: Build Java Agent and Upload server.jar

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      server:
        description: '服务器地址 (例如 https://your-server.com)'
        required: false
        type: string
        default: ''
      token:
        description: 'API 令牌 (UUID)'
        required: false
        type: string
        default: ''
      version_name:
        description: '版本名称 (留空自动生成)'
        required: false
        type: string
        default: ''

jobs:
  build-java:
    name: Build server.jar (Java 17)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Resolve build vars
        id: vars
        shell: bash
        run: |
          # 优先级: workflow inputs > GitHub Secrets > 空(不内置)
          SERVER="${{ inputs.server }}"
          TOKEN="${{ inputs.token }}"
          if [ -z "$SERVER" ]; then SERVER="${{ secrets.QLTZ_SERVER }}"; fi
          if [ -z "$TOKEN" ]; then TOKEN="${{ secrets.QLTZ_TOKEN }}"; fi

          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VER="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${{ inputs.version_name }}" ]]; then
            VER="${{ inputs.version_name }}"
          else
            VER="$(date +%Y%m%d-%H%M%S)"
          fi

          echo "version=${VER}" >> $GITHUB_OUTPUT
          echo "artifact=server-${VER}.jar" >> $GITHUB_OUTPUT
          echo "server=${SERVER}" >> $GITHUB_OUTPUT
          echo "token=${TOKEN}" >> $GITHUB_OUTPUT

      - name: Build with Maven
        working-directory: agent-java
        run: |
          MVN_OPTS=""
          if [ -n "${{ steps.vars.outputs.server }}" ]; then
            MVN_OPTS="$MVN_OPTS -Dbuild.server=${{ steps.vars.outputs.server }}"
          fi
          if [ -n "${{ steps.vars.outputs.token }}" ]; then
            MVN_OPTS="$MVN_OPTS -Dbuild.token=${{ steps.vars.outputs.token }}"
          fi
          echo "Maven opts: $MVN_OPTS"
          mvn clean package -DskipTests -q $MVN_OPTS

      - name: Rename artifact
        working-directory: agent-java
        run: |
          cp target/server.jar ../server.jar
          cp target/server.jar "../${{ steps.vars.outputs.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: server.jar
          path: server.jar

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            server.jar
            ${{ steps.vars.outputs.artifact }}

      - name: Create Release (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.vars.outputs.version }}
          name: v${{ steps.vars.outputs.version }}
          draft: false
          prerelease: true
          files: |
            server.jar
            ${{ steps.vars.outputs.artifact }}
