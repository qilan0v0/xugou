name: Build and Upload Binary

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build Agent Binary
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        arch: [amd64, arm64]
        include:
          - os: ubuntu-latest
            arch: amd64
            artifact_name: xugou-agent-linux-amd64
            asset_name: xugou-agent-linux-amd64
          - os: ubuntu-latest
            arch: arm64
            artifact_name: xugou-agent-linux-arm64
            asset_name: xugou-agent-linux-arm64
          - os: macos-latest
            arch: amd64
            artifact_name: xugou-agent-darwin-amd64
            asset_name: xugou-agent-darwin-amd64
          - os: macos-latest
            arch: arm64
            artifact_name: xugou-agent-darwin-arm64
            asset_name: xugou-agent-darwin-arm64
          - os: windows-latest
            arch: amd64
            artifact_name: xugou-agent-windows-amd64.exe
            asset_name: xugou-agent-windows-amd64
          - os: windows-latest
            arch: arm64
            artifact_name: xugou-agent-windows-arm64.exe
            asset_name: xugou-agent-windows-arm64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24'

    - name: Set version
      id: version
      shell: bash
      run: |
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=0.1.0-dev" >> $GITHUB_OUTPUT
        fi
        echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
      env:
        GITHUB_REF: ${{ github.ref }}

    - name: Build
      env:
        GOOS: ${{ matrix.os == 'ubuntu-latest' && 'linux' || matrix.os == 'macos-latest' && 'darwin' || 'windows' }}
        GOARCH: ${{ matrix.arch }}
        VERSION: ${{ steps.version.outputs.VERSION }}
        BUILD_DATE: ${{ steps.version.outputs.BUILD_DATE }}
        GIT_COMMIT: ${{ github.sha }}
      run: |
        cd agent
        CGO_ENABLED=0 go build -v -ldflags="-X github.com/xugou/agent/cmd/agent.Version=${VERSION} -X github.com/xugou/agent/cmd/agent.GitCommit=${GIT_COMMIT} -X github.com/xugou/agent/cmd/agent.BuildDate=${BUILD_DATE} -X github.com/xugou/agent/pkg/collector.Version=${VERSION}" -o ${{ matrix.artifact_name }} .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}
        path: agent/${{ matrix.artifact_name }}

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Generate version
      id: version
      run: |
        if [[ "${{ github.event_name }}" == "release" ]]; then
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "RELEASE_ID=${{ github.event.release.id }}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
          echo "RELEASE_ID=" >> $GITHUB_OUTPUT
        fi

    - name: Create Release (manual dispatch)
      if: github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.VERSION }}
        name: v${{ steps.version.outputs.VERSION }}
        draft: false
        prerelease: true
        files: |
          xugou-agent-linux-amd64/xugou-agent-linux-amd64
          xugou-agent-linux-arm64/xugou-agent-linux-arm64
          xugou-agent-darwin-amd64/xugou-agent-darwin-amd64
          xugou-agent-darwin-arm64/xugou-agent-darwin-arm64
          xugou-agent-windows-amd64/xugou-agent-windows-amd64.exe
          xugou-agent-windows-arm64/xugou-agent-windows-arm64.exe

    - name: Upload to existing Release (release event)
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.VERSION }}
        files: |
          xugou-agent-linux-amd64/xugou-agent-linux-amd64
          xugou-agent-linux-arm64/xugou-agent-linux-arm64
          xugou-agent-darwin-amd64/xugou-agent-darwin-amd64
          xugou-agent-darwin-arm64/xugou-agent-darwin-arm64
          xugou-agent-windows-amd64/xugou-agent-windows-amd64.exe
          xugou-agent-windows-arm64/xugou-agent-windows-arm64.exe
