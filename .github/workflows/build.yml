name: Build and Upload Binary

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version_name:
        description: 'version name (leave blank for auto)'
        required: false
        type: string
        default: ''
      binary_name:
        description: 'binary name (e.g. xugou-agent)'
        required: false
        type: string
        default: 'xugou-agent'

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.arch }}
    runs-on: ${{ matrix.goos == 'darwin' && 'macos-latest' || matrix.goos == 'windows' && 'windows-latest' || 'ubuntu-latest' }}
    strategy:
      matrix:
        goos: [linux, darwin, windows, freebsd, netbsd]
        arch: [amd64, arm64]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24'

    - name: Set version and binary name
      id: vars
      shell: bash
      run: |
        BIN="${{ inputs.binary_name }}"
        GOOS="${{ matrix.goos }}"
        GOARCH="${{ matrix.arch }}"
        EXT="${{ matrix.goos == 'windows' && '.exe' || '' }}"
        ARTIFACT="${BIN}-${GOOS}-${GOARCH}${EXT}"
        echo "artifact=${ARTIFACT}" >> $GITHUB_OUTPUT
        echo "goos=${GOOS}" >> $GITHUB_OUTPUT
        echo "goarch=${GOARCH}" >> $GITHUB_OUTPUT

        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=0.1.0-dev" >> $GITHUB_OUTPUT
        fi
        echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
      env:
        GITHUB_REF: ${{ github.ref }}

    - name: Build
      shell: bash
      env:
        GOOS: ${{ steps.vars.outputs.goos }}
        GOARCH: ${{ steps.vars.outputs.goarch }}
        VERSION: ${{ steps.vars.outputs.VERSION }}
        BUILD_DATE: ${{ steps.vars.outputs.BUILD_DATE }}
        CGO_ENABLED: '0'
      run: |
        cd agent
        go build -v -ldflags="-X github.com/xugou/agent/cmd/agent.Version=${VERSION} -X github.com/xugou/agent/cmd/agent.GitCommit=${{ github.sha }} -X github.com/xugou/agent/cmd/agent.BuildDate=${BUILD_DATE} -X github.com/xugou/agent/pkg/collector.Version=${VERSION}" -o ${{ steps.vars.outputs.artifact }} .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.vars.outputs.artifact }}
        path: agent/${{ steps.vars.outputs.artifact }}

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Generate version
      id: version
      run: |
        if [[ "${{ github.event_name }}" == "release" ]]; then
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "RELEASE_ID=${{ github.event.release.id }}" >> $GITHUB_OUTPUT
        else
          INPUT_VER="${{ inputs.version_name }}"
          if [[ -n "$INPUT_VER" ]]; then
            echo "VERSION=$INPUT_VER" >> $GITHUB_OUTPUT
          else
            echo "VERSION=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
          fi
          echo "RELEASE_ID=" >> $GITHUB_OUTPUT
        fi

    - name: List artifacts
      run: ls -R

    - name: Create Release (manual dispatch)
      if: github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.VERSION }}
        name: v${{ steps.version.outputs.VERSION }}
        draft: false
        prerelease: true
        files: |
          ${{ inputs.binary_name }}-linux-amd64/${{ inputs.binary_name }}-linux-amd64
          ${{ inputs.binary_name }}-linux-arm64/${{ inputs.binary_name }}-linux-arm64
          ${{ inputs.binary_name }}-darwin-amd64/${{ inputs.binary_name }}-darwin-amd64
          ${{ inputs.binary_name }}-darwin-arm64/${{ inputs.binary_name }}-darwin-arm64
          ${{ inputs.binary_name }}-windows-amd64.exe/${{ inputs.binary_name }}-windows-amd64.exe
          ${{ inputs.binary_name }}-windows-arm64.exe/${{ inputs.binary_name }}-windows-arm64.exe
          ${{ inputs.binary_name }}-freebsd-amd64/${{ inputs.binary_name }}-freebsd-amd64
          ${{ inputs.binary_name }}-freebsd-arm64/${{ inputs.binary_name }}-freebsd-arm64
          ${{ inputs.binary_name }}-netbsd-amd64/${{ inputs.binary_name }}-netbsd-amd64
          ${{ inputs.binary_name }}-netbsd-arm64/${{ inputs.binary_name }}-netbsd-arm64

    - name: Upload to existing Release (release event)
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.VERSION }}
        files: |
          xugou-agent-linux-amd64/xugou-agent-linux-amd64
          xugou-agent-linux-arm64/xugou-agent-linux-arm64
          xugou-agent-darwin-amd64/xugou-agent-darwin-amd64
          xugou-agent-darwin-arm64/xugou-agent-darwin-arm64
          xugou-agent-windows-amd64.exe/xugou-agent-windows-amd64.exe
          xugou-agent-windows-arm64.exe/xugou-agent-windows-arm64.exe
          xugou-agent-freebsd-amd64/xugou-agent-freebsd-amd64
          xugou-agent-freebsd-arm64/xugou-agent-freebsd-arm64
          xugou-agent-netbsd-amd64/xugou-agent-netbsd-amd64
          xugou-agent-netbsd-arm64/xugou-agent-netbsd-arm64
