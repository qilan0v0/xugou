name: 构建 Agent 探针镜像

run-name: 构建 Agent 镜像 (${{ inputs.image_tag || 'latest' }}) by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: '镜像标签（留空 = latest）'
        required: false
        type: string
        default: ''
      platforms:
        description: '目标架构'
        required: false
        type: choice
        options:
          - 'linux/amd64,linux/arm64'
          - 'linux/amd64'
          - 'linux/arm64'
        default: 'linux/amd64,linux/arm64'
      push:
        description: '推送镜像到仓库（取消则仅构建测试）'
        required: false
        type: boolean
        default: true
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository_owner }}/qltz-agent

jobs:
  build-and-push:
    name: 构建并推送镜像
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 计算镜像标签
        id: meta
        shell: bash
        run: |
          if [[ -n "${{ inputs.image_tag }}" ]]; then
            IMG_TAG="${{ inputs.image_tag }}"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            IMG_TAG="${{ github.ref_name }}"
            IMG_TAG="${IMG_TAG#v}"
          else
            IMG_TAG="latest"
          fi

          COMMIT_HASH="${GITHUB_SHA:0:7}"
          NOW="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          REPO_FULL="${REGISTRY}/${REPO}"
          REPO_FULL="$(echo "$REPO_FULL" | tr '[:upper:]' '[:lower:]')"

          echo "image_tag=${IMG_TAG}"       >> "$GITHUB_OUTPUT"
          echo "repository=${REPO_FULL}"    >> "$GITHUB_OUTPUT"
          echo "created=${NOW}"             >> "$GITHUB_OUTPUT"
          echo "commit=${COMMIT_HASH}"      >> "$GITHUB_OUTPUT"

          echo "### 构建信息" >> "$GITHUB_STEP_SUMMARY"
          echo "- 提交: \`${COMMIT_HASH}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- 镜像: \`${REPO_FULL}:${IMG_TAG}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录容器仓库
        if: github.event_name == 'release' || inputs.push
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送镜像
        uses: docker/build-push-action@v6
        with:
          context: agent
          file: agent/Dockerfile
          platforms: ${{ inputs.platforms || 'linux/amd64,linux/arm64' }}
          push: ${{ github.event_name == 'release' || inputs.push }}
          tags: |
            ${{ steps.meta.outputs.repository }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.repository }}:latest
          labels: |
            org.opencontainers.image.title=Qltz Agent
            org.opencontainers.image.description=轻量 Agent 探针
            org.opencontainers.image.version=${{ steps.meta.outputs.image_tag }}
            org.opencontainers.image.created=${{ steps.meta.outputs.created }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.commit }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max