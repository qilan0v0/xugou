name: 构建 Agent 探针镜像

run-name: 构建 Agent 镜像 (${{ inputs.agent_version || 'latest' }}) by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      agent_version:
        description: 'Agent Release 版本标签（留空 = 自动使用最新 Release）'
        required: false
        type: string
        default: ''
      binary_prefix:
        description: '二进制资产名前缀（最终下载 前缀-linux-架构）'
        required: false
        type: string
        default: 'qltz-agent'
      image_tag:
        description: '镜像标签（留空 = 按版本号自动生成）'
        required: false
        type: string
        default: ''
      platforms:
        description: '目标架构'
        required: false
        type: choice
        options:
          - 'linux/amd64,linux/arm64'
          - 'linux/amd64'
          - 'linux/arm64'
        default: 'linux/amd64,linux/arm64'
      push:
        description: '推送镜像到仓库（取消则仅构建测试）'
        required: false
        type: boolean
        default: true
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository_owner }}/qltz-agent

jobs:
  build-and-push:
    name: 构建并推送镜像
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 计算构建元数据
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            # 由 Release 触发：使用该 Release 的标签
            AGENT_VER="${{ github.ref_name }}"
          elif [[ -n "${{ inputs.agent_version }}" ]]; then
            # 手动指定了版本
            AGENT_VER="${{ inputs.agent_version }}"
          else
            # 未指定：通过 GitHub API 解析最新 Release 标签
            # 注意：本项目的 Release 多为 prerelease，/releases/latest 会忽略它们而返回 404，
            # 因此改用 /releases 列表取第一个（按发布时间倒序，含 prerelease）。
            echo "未指定版本，正在获取最新 Release..."
            AGENT_VER="$(curl -fsSL \
              -H 'Accept: application/vnd.github+json' \
              -H 'Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}' \
              'https://api.github.com/repos/${{ github.repository }}/releases?per_page=1' \
              | grep -m1 '"tag_name"' | sed -E 's/.*"tag_name": *"([^"]+)".*/\1/')"
          fi

          if [[ -z "$AGENT_VER" ]]; then
            echo "::error::无法确定 Agent 版本：仓库可能还没有任何 Release，请先发布 Release 或手动填写版本标签"
            exit 1
          fi

          if [[ -n "${{ inputs.image_tag }}" ]]; then
            IMG_TAG="${{ inputs.image_tag }}"
          else
            IMG_TAG="${AGENT_VER#v}"
          fi

          REPO_FULL="${REGISTRY}/${REPO}"
          REPO_FULL="$(echo "$REPO_FULL" | tr '[:upper:]' '[:lower:]')"

          echo "agent_version=${AGENT_VER}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMG_TAG}"       >> "$GITHUB_OUTPUT"
          echo "repository=${REPO_FULL}"    >> "$GITHUB_OUTPUT"
          echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

          echo "### 构建信息" >> "$GITHUB_STEP_SUMMARY"
          echo "- Agent 版本: \`${AGENT_VER}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- 镜像: \`${REPO_FULL}:${IMG_TAG}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录容器仓库
        if: github.event_name == 'release' || inputs.push
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送镜像
        uses: docker/build-push-action@v6
        with:
          context: agent
          file: agent/Dockerfile
          platforms: ${{ inputs.platforms || 'linux/amd64,linux/arm64' }}
          push: ${{ github.event_name == 'release' || inputs.push }}
          build-args: |
            AGENT_VERSION=${{ steps.meta.outputs.agent_version }}
            BINARY_PREFIX=${{ inputs.binary_prefix || 'qltz-agent' }}
            REPO=${{ github.repository }}
          tags: |
            ${{ steps.meta.outputs.repository }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.repository }}:latest
          labels: |
            org.opencontainers.image.title=Qltz Agent
            org.opencontainers.image.description=柒蓝轻量监控 Agent 探针
            org.opencontainers.image.version=${{ steps.meta.outputs.image_tag }}
            org.opencontainers.image.created=${{ steps.meta.outputs.created }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
