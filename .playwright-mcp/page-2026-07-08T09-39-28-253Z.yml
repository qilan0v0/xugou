    - generic [ref=e15]:
      - generic [ref=e16]:
        - generic [ref=e17]: "Last updated: 9 May 2026"
        - heading "Fair Use Policy" [level=1] [ref=e18]
        - paragraph [ref=e19]: Free and paid hosting run on shared infrastructure. This Fair Use Policy keeps X Systems Hosting safe, stable, and fair for everyone. By using our services, you agree to use resources responsibly and follow these rules.
      - generic [ref=e20]:
        - generic [ref=e21]:
          - heading "1. Fair resource use" [level=2] [ref=e22]
          - paragraph [ref=e23]: You may use the resources assigned to your plan for normal Discord bot hosting, Minecraft hosting, testing, and related project use. You may not run workloads that create excessive CPU, memory, disk, network, database, process, backup, or allocation usage compared with normal hosting activity.
        - generic [ref=e24]:
          - heading "2. Free hosting and credits" [level=2] [ref=e25]
          - paragraph [ref=e26]: Free hosting is shared by many users and may require credits to keep servers active. Credits, quests, and rewards must be earned honestly. You may not automate, farm, resell, duplicate, exploit, or bypass credit systems, reward systems, activity checks, limits, cooldowns, or plan restrictions.
        - generic [ref=e27]:
          - heading "3. Prohibited bots and activity" [level=2] [ref=e28]
          - paragraph [ref=e29]: "The following are not allowed: self bots, token grabbers, malware, scam bots, spam bots, phishing, credential theft, nuke bots, raid tools, DDoS tools, miners, proxy abuse, scraping abuse, botnets, account generators, mass DM tools, or anything designed to bypass platform limits, Discord rules, Minecraft rules, or our own systems."
          - paragraph [ref=e30]: Bots designed primarily for mass advertising, scam automation, fake verification systems, malicious logging, fake Nitro systems, fake Roblox verification systems, token collection, or impersonation are prohibited.
        - generic [ref=e31]:
          - heading "4. Security rules" [level=2] [ref=e32]
          - paragraph [ref=e33]: Do not attempt unauthorized access, privilege escalation, scanning, exploitation, reverse engineering of private systems, attacks against other users, attacks against our infrastructure, or interference with monitoring, abuse detection, or service controls. Do not share your panel password or account access.
          - paragraph [ref=e34]: Attempting to steal Discord tokens, Roblox credentials, API keys, cookies, authentication sessions, browser data, or user information is strictly prohibited and may result in immediate termination, reporting to providers, and permanent bans.
        - generic [ref=e35]:
          - heading "5. Content restrictions" [level=2] [ref=e36]
          - paragraph [ref=e37]: You may not host, distribute, or link to illegal content, malware, stolen data, phishing pages, token theft tools, copyrighted material without permission, hate content, threats, harassment, sexual exploitation, scams, fraudulent offers, or content designed to harm people, systems, services, or communities.
        - generic [ref=e38]:
          - heading "6. Minecraft hosting use" [level=2] [ref=e39]
          - paragraph [ref=e40]: Minecraft servers must be used within the resources and terms of the selected plan. You are responsible for plugins, mods, worlds, configuration, permissions, and backups. Servers that overload nodes, abuse storage, run unrelated software, attack other services, or bypass plan limits may be limited, suspended, or terminated.
        - generic [ref=e41]:
          - heading "7. Backups" [level=2] [ref=e42]
          - paragraph [ref=e43]: Always back up important files. Shared hosting can involve crashes, user mistakes, software problems, deleted files, failed plugins, corruption, suspension, or termination. Backup features may be limited and are not a replacement for keeping your own copies.
        - generic [ref=e44]:
          - heading "8. Monitoring and enforcement" [level=2] [ref=e45]
          - paragraph [ref=e46]: We may monitor usage, hosted files, logs, processes, network patterns, and account activity to enforce this policy and protect the platform. If we detect abuse or risk, we may throttle, restart, suspend, remove content, delete servers, terminate accounts, revoke credits, refuse refunds, or report activity to relevant providers or authorities when appropriate.
        - generic [ref=e47]:
          - heading "9. Appeals" [level=2] [ref=e48]
          - paragraph [ref=e49]: If you believe enforcement was a mistake, contact support with your account information, server details, and a clear explanation. Appeals are reviewed case by case. Serious malware, phishing, token theft, fraud, or repeated abuse may not be eligible for reinstatement.
        - generic [ref=e50]:
          - heading "10. Contact" [level=2] [ref=e51]
