        - paragraph [ref=e128]: The watch-ad and invite rewards use a rolling 24-hour limit. The limit is at least 25 credits. When the combined daily cost of your Discord and web servers is higher, the limit becomes that total daily cost plus a 5-credit buffer. The Discord hosting page shows how much has been earned and when more ad rewards become available.
