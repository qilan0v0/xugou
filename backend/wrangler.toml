name = "xugou-backend"
main = "src/index.ts"
compatibility_date = "2025-03-10"
compatibility_flags = ["nodejs_compat"]

[env.production]
vars = { NODE_ENV = "production" }

# 添加定时触发器，每分钟执行一次监控检查
[triggers]
crons = ["* * * * *"]

[env.development]
vars = { NODE_ENV = "development" }

[[d1_databases]]
binding = "DB"
database_name = "xugou_db"
database_id = "b3bbe7a0-b4b2-4345-9c26-6b8fb3a4c899"

[vars]
JWT_SECRET = "your-secret-key-change-in-production" 
ENABLE_DB_INIT = "true" 
